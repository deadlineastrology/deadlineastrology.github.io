<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Services - Deadline Astrology</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="header.js" defer></script>

  <style>
    .service-item a.button {
      display: inline-block;
      margin-top: 1rem;
      text-align: center;
      background-color: #0070ba;
      color: white;
      padding: 0.6rem 1.3rem;
      border-radius: 4px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 8px rgb(0 112 186 / 0.4);
      transition: background-color 0.3s ease;
    }
    .service-item a.button:hover {
      background-color: #005c99;
    }
    .service-item {
      text-align: left;
      max-width: 450px;
      margin-bottom: 2rem;
    }
    .service-item img {
      display: block;
      max-width: 400px;
      width: 100%;
      height: auto;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
      box-sizing: border-box;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    @media (min-width: 768px) {
      .service-item {
        max-width: none;
        margin-bottom: 3rem;
        display: flex;
        align-items: center;
        gap: 2rem;
      }
      .service-item img {
        width: 350px;
        max-width: 350px;
        margin: 0;
        flex-shrink: 0;
      }
      .service-item > div,
      .service-item > h3,
      .service-item > p,
      .service-item > a.button {
        max-width: 500px;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <section id="services">
    <h2>🔮 Personal Readings & Services</h2>

    <!-- Live Chat Section -->
    <div class="service-item">
      <img src="assets/livechat.jpg" alt="Live Chat" />
      <div>
        <h3>⚡️ Live Chat - Psychic Reading — First 3 minutes Free</h3>
        <p>Quick answers to key questions Live Right.</p>
        <a href="https://psychic.bitwine.com/psychics/497617-timeline_astrology"
           class="button"
           target="_blank"
           rel="noopener noreferrer">
          Start Live Chat
        </a>
      </div>
    </div>

    <!-- Birth Chart Reading -->
    <div class="service-item">
      <img src="assets/birthchart.jpg" alt="Birth Chart Reading" />
      <div>
        <h3>🪐 Birth Chart Reading — $50</h3>
        <p>In-Depth Birth Chart Reading</p>

        <!-- PayPal Hosted Button HTML form -->
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top">
          <input type="hidden" name="cmd" value="_s-xclick" />
          <input type="hidden" name="hosted_button_id" value="AA6QGJM8BQU56" />
          <input type="image" src="https://www.paypalobjects.com/en_US/i/btn/btn_buynowCC_LG.gif"
                 border="0" name="submit" alt="PayPal - The safer, easier way to pay online!" />
          <img alt="" border="0" src="https://www.paypalobjects.com/en_US/i/scr/pixel.gif" width="1" height="1" />
        </form>
      </div>
    </div>
  </section>

  <footer>&copy; 2025 Deadline Astrology. All rights reserved.</footer>
</body>
</html>
