<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me - Deadline Astrology</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0d0d0d;
      color: #f0f0f0;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 20px;
      max-width: 900px;
      background-color: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 15px rgba(255, 215, 0, 0.5);
    }

    .image {
      flex: 1;
    }

    .image img {
      width: 100%;
      max-width: 300px; /* Match PayPal image size */
      border-radius: 10px;
      display: block;
    }

    .content {
      flex: 2;
    }

    h1 {
      color: gold;
      font-family: 'Amatic SC', cursive;
      font-size: 2.5rem;
    }

    p {
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .buttons a {
      background-color: gold;
      color: black;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .buttons a:hover {
      background-color: darkgoldenrod;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- First image on left -->
    <div class="image">
      <img src="first-image.jpg" alt="Astrology Graphic">
    </div>

    <div class="content">
      <h1>About Me</h1>
      <p>
        My name is Saint Nicky JK — Astrologer and founder of Deadline Astrology.  
        I offer live, chat-based Astrology and Tarot readings where you can connect with me in real time.  
        Start a chat with me — your first 3 minutes are free!
      </p>

      <!-- Buttons -->
      <div class="buttons">
        <a href="https://psychic.bitwine.com/psychics/497617-timeline_astrology">Start Chat</a>
        <a href="https://my-order-link.com">Get Yours Now</a>
      </div>

      <!-- PayPal button -->
      <div style="margin-top: 15px;">
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_self">
          <input type="hidden" name="cmd" value="_s-xclick">
          <input type="hidden" name="hosted_button_id" value="YOUR_BUTTON_ID">
          <input type="image" src="paypal-button.jpg" border="0" name="submit" alt="Pay with PayPal" style="max-width: 300px;">
          <img alt="" border="0" src="https://www.paypal.com/en_US/i/scr/pixel.gif" width="1" height="1">
        </form>
      </div>
    </div>
  </div>
</body>
</html>
