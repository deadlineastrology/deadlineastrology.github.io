<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Services - Deadline Astrology</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="header.js" defer></script>

  <!-- Load PayPal SDK once -->
  <script src="https://www.paypal.com/sdk/js?client-id=BAA7Xz_enaMGOxo9WE9hyv0Yf4_6WZHxnH-1WAQFg5nyGRAS_i1uitHZTPdFmc_2UaF3vQssaUNDbmNE3g&currency=USD"></script>

  <style>
    /* Your existing styles unchanged */
    .service-item a.button {
      display: inline-block;
      margin-top: 1rem;
      text-align: center;
      background-color: #0070ba;
      color: white;
      padding: 0.6rem 1.3rem;
      border-radius: 4px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 8px rgb(0 112 186 / 0.4);
      transition: background-color 0.3s ease;
    }
    .service-item a.button:hover {
      background-color: #005c99;
    }
    .service-item {
      text-align: left;
      max-width: 450px;
      margin-bottom: 2rem;
    }
    .service-item img {
      display: block;
      max-width: 400px;
      width: 100%;
      height: auto;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
      box-sizing: border-box;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    @media (min-width: 768px) {
      .service-item {
        max-width: none;
        margin-bottom: 3rem;
        display: flex;
        align-items: center;
        gap: 2rem;
      }
      .service-item img {
        width: 350px;
        max-width: 350px;
        margin: 0;
        flex-shrink: 0;
      }
      .service-item > div,
      .service-item > h3,
      .service-item > p,
      .service-item > a.button {
        max-width: 500px;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <section id="services">
    <h2>🔮 Personal Readings & Services</h2>

    <!-- Live Chat Section -->
    <div class="service-item">
      <img src="assets/livechat.jpg" alt="Live Chat" />
      <div>
        <h3>⚡️ Live Chat - Psychic Reading — First 3 minutes Free</h3>
        <p>Quick answers to key questions Live Right.</p>
        <a href="https://psychic.bitwine.com/psychics/497617-timeline_astrology"
           class="button"
           target="_blank"
           rel="noopener noreferrer">
          Start Live Chat
        </a>
      </div>
    </div>

    <!-- Birth Chart Reading -->
    <div class="service-item">
      <div>
        <h3>🪐 Birth Chart Reading — $50</h3>
        <p>In-Depth Birth Chart Reading</p>
        <div id="paypal-button-container"></div>
      </div>
    </div>
  </section>

  <footer>&copy; 2025 Deadline Astrology. All rights reserved.</footer>

  <script>
    paypal.Buttons({
      style: {
        layout: 'vertical',
        color:  'blue',
        shape:  'rect',
        label:  'paypal'
      },
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: '50.00'
            },
            reference_id: 'AA6QGJM8BQU56'
          }]
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          alert('Transaction completed by ' + details.payer.name.given_name);
        });
      }
    }).render('#paypal-button-container');
  </script>
</body>
</html>
